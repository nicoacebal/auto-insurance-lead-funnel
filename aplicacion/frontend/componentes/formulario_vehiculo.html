<div class="paso" id="paso-vehiculo">
  <nav class="stepper" aria-label="Progreso del cotizador">
    <ol class="stepper-lista stepper-lista-4">
      <li class="stepper-item activo">
        <span class="stepper-numero">1</span>
        <span class="stepper-texto">Vehiculo</span>
      </li>
      <li class="stepper-item">
        <span class="stepper-numero">2</span>
        <span class="stepper-texto">Pre-cotizacion</span>
      </li>
      <li class="stepper-item">
        <span class="stepper-numero">3</span>
        <span class="stepper-texto">Contacto</span>
      </li>
      <li class="stepper-item">
        <span class="stepper-numero">4</span>
        <span class="stepper-texto">Confirmacion</span>
      </li>
    </ol>
  </nav>

  <p class="paso-indicador">Paso 1 de 4</p>
  <h3 class="paso-titulo">Contanos sobre tu vehiculo</h3>
  <p class="texto-ayuda">Con estos datos te mostramos una estimacion inicial en segundos.</p>

  {% if error %}
  <p class="mensaje-error">{{ error }}</p>
  {% endif %}

  <form
    id="formulario-vehiculo"
    class="formulario"
    data-cotizador-step="vehiculo"
    hx-post="/cotizador/paso-1"
    hx-target="#flujo-cotizador"
    hx-swap="innerHTML"
    hx-indicator="#indicador-carga"
  >
    <input type="hidden" name="utm_source" data-origen="utm_source" value="{{ utm_source | default('', true) }}" />
    <input type="hidden" name="utm_medium" data-origen="utm_medium" value="{{ utm_medium | default('', true) }}" />
    <input type="hidden" name="utm_campaign" data-origen="utm_campaign" value="{{ utm_campaign | default('', true) }}" />
    <input type="hidden" name="referrer" data-origen="referrer" value="{{ referrer | default('', true) }}" />
    <input type="hidden" name="landing_page" data-origen="landing_page" value="{{ landing_page | default('', true) }}" />

    <label for="marca">Marca</label>
    <input
      id="marca"
      name="marca"
      type="text"
      placeholder="Ej: Toyota"
      value="{{ marca | default('', true) }}"
      required
    />

    <label for="modelo">Modelo</label>
    <input
      id="modelo"
      name="modelo"
      type="text"
      placeholder="Ej: Corolla"
      value="{{ modelo | default('', true) }}"
      required
    />

    <label for="anio">Anio</label>
    <input
      id="anio"
      name="anio"
      type="number"
      min="1990"
      placeholder="Ej: 2022"
      value="{{ anio | default('', true) }}"
      required
    />

    <label for="version">Version</label>
    <input
      id="version"
      name="version"
      type="text"
      placeholder="Ej: XEI 2.0"
      value="{{ version | default('', true) }}"
      required
    />

    <button class="boton-primario" type="submit">Calcular estimacion</button>
  </form>
</div>
