<div class="paso" id="paso-contacto">
  <p class="paso-indicador">Paso 2 de 3</p>
  <h3 class="paso-titulo">Tus datos de contacto</h3>
  <p class="texto-ayuda">Usaremos esta informacion para enviarte una propuesta personalizada.</p>

  <div class="resumen-mini">
    <strong>Vehiculo:</strong> {{ marca }} {{ modelo }} {{ version }} ({{ anio }})
  </div>

  {% if error %}
  <p class="mensaje-error">{{ error }}</p>
  {% endif %}

  <form
    class="formulario"
    hx-post="/cotizador/paso-2"
    hx-target="#flujo-cotizador"
    hx-swap="innerHTML"
    hx-indicator="#indicador-carga"
  >
    <input type="hidden" name="marca" value="{{ marca }}" />
    <input type="hidden" name="modelo" value="{{ modelo }}" />
    <input type="hidden" name="anio" value="{{ anio }}" />
    <input type="hidden" name="version" value="{{ version }}" />

    <label for="nombre">Nombre y apellido</label>
    <input
      id="nombre"
      name="nombre"
      type="text"
      placeholder="Ej: Maria Perez"
      value="{{ nombre | default('', true) }}"
      required
    />

    <label for="telefono">Telefono</label>
    <input
      id="telefono"
      name="telefono"
      type="tel"
      placeholder="Ej: 11 1234 5678"
      value="{{ telefono | default('', true) }}"
      required
    />

    <label for="email">Correo electronico</label>
    <input
      id="email"
      name="email"
      type="email"
      placeholder="Ej: maria@email.com"
      value="{{ email | default('', true) }}"
      required
    />

    <div class="acciones acciones-dobles">
      <button class="boton-secundario" type="button" hx-get="/cotizador/reiniciar" hx-target="#flujo-cotizador" hx-swap="innerHTML" hx-indicator="#indicador-carga">
        Volver
      </button>
      <button class="boton-primario" type="submit">Ver cotizacion</button>
    </div>
  </form>
</div>
