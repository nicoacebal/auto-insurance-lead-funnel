version: "3"

services:
  backend:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt
      && uvicorn backend.api.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./:/app
    networks:
      - data_platform

  n8n:
    image: n8nio/n8n
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_PUBLIC_BASE_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: America/Argentina/Buenos_Aires
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - data_platform

  dw_postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${DW_POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${DW_POSTGRES_DB:-insurance_dw}
      POSTGRES_USER: ${DW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DW_POSTGRES_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DW_POSTGRES_USER} -d ${DW_POSTGRES_DB:-insurance_dw}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - dw_postgres_data:/var/lib/postgresql/data
    networks:
      - data_platform

  superset:
    image: apache/superset:4.1.4
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      dw_postgres:
        condition: service_healthy
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    environment:
      SUPERSET_HOME: /app/superset_home
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_LOAD_EXAMPLES: "no"
      TZ: America/Argentina/Buenos_Aires
    command: >
      /bin/sh -c "superset db upgrade
      && superset init
      && superset run -h 0.0.0.0 -p 8088"
    volumes:
      - superset_home:/app/superset_home
    networks:
      - data_platform

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:latest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      dw_postgres:
        condition: service_healthy
    working_dir: /usr/app
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ./:/usr/app
      - dbt_state:/root/.dbt
    networks:
      - data_platform

volumes:
  n8n_data:
  dw_postgres_data:
  superset_home:
  dbt_state:

networks:
  data_platform:
    driver: bridge
